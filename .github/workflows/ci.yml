name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run Ruff (lint)
        run: ruff check .

      - name: Run Black (format check)
        run: black --check .

      - name: Show Black version
        run: black --version

      - name: Show Ruff version
        run: ruff --version

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      DB_HOST: dummy
      DB_NAME: dummy
      DB_USER: dummy
      DB_PASSWORD: dummy
      SECRET_KEY: dummy
      GOOGLE_CODING_API_KEY: dummy
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_REGION: dummy
      AWS_S3_BUCKET: dummy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -m unit
